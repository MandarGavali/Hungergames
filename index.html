<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>LunchSwipe 🍽️</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0e11;
    --surface: #1a1820;
    --card-bg: #211f2a;
    --accent: #ff5c5c;
    --yes: #3ddc84;
    --no: #ff5c5c;
    --text: #f0eef8;
    --muted: #8a8599;
    --border: #2e2b3a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    position: relative;
  }

  /* Ambient background blobs */
  body::before {
    content: '';
    position: fixed;
    top: -120px; left: -80px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(255,92,92,0.18) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -80px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, rgba(61,220,132,0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    z-index: 10;
    text-align: center;
    padding: 24px 20px 10px;
    width: 100%;
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.6rem, 6vw, 2.2rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ff5c5c, #ffb347);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  header p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* ── PROGRESS ── */
  .progress-bar-wrap {
    z-index: 10;
    width: min(420px, 92vw);
    margin: 10px auto 0;
    background: var(--border);
    border-radius: 99px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff5c5c, #ffb347);
    border-radius: 99px;
    transition: width 0.4s ease;
  }
  .progress-label {
    z-index: 10;
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* ── CARD STACK ── */
  #stack {
    z-index: 10;
    position: relative;
    width: min(380px, 90vw);
    height: clamp(320px, 55vw, 420px);
    margin: 18px auto 0;
    flex-shrink: 0;
  }

  .card {
    position: absolute;
    inset: 0;
    background: var(--card-bg);
    border-radius: 24px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: grab;
    user-select: none;
    touch-action: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    transition: transform 0.08s, box-shadow 0.08s;
    will-change: transform;
    overflow: hidden;
  }
  .card:active { cursor: grabbing; }

  .card-emoji {
    font-size: clamp(3rem, 12vw, 4.5rem);
    line-height: 1;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
    pointer-events: none;
  }
  .card-name {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.2rem, 5vw, 1.7rem);
    font-weight: 800;
    text-align: center;
    padding: 0 20px;
    pointer-events: none;
    letter-shadow: -0.02em;
  }
  .card-tag {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    pointer-events: none;
  }

  /* Swipe overlays */
  .card .stamp-yes,
  .card .stamp-no {
    position: absolute;
    top: 28px;
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    padding: 6px 16px;
    border-radius: 10px;
    border: 3px solid;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.1s;
    letter-spacing: 0.04em;
  }
  .card .stamp-yes {
    left: 24px;
    color: var(--yes);
    border-color: var(--yes);
    transform: rotate(-12deg);
  }
  .card .stamp-no {
    right: 24px;
    color: var(--no);
    border-color: var(--no);
    transform: rotate(12deg);
  }

  /* Stacked cards behind */
  .card.behind-1 {
    transform: scale(0.95) translateY(12px);
    z-index: 1;
    pointer-events: none;
  }
  .card.behind-2 {
    transform: scale(0.9) translateY(24px);
    z-index: 0;
    pointer-events: none;
  }
  .card.top {
    z-index: 5;
  }

  /* ── BUTTONS ── */
  .actions {
    z-index: 10;
    display: flex;
    gap: 24px;
    margin-top: 22px;
    align-items: center;
  }
  .btn-action {
    width: 60px; height: 60px;
    border-radius: 50%;
    border: none;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .btn-action:hover { transform: scale(1.1); }
  .btn-action:active { transform: scale(0.95); }
  .btn-nope {
    background: #2a1f2a;
    color: var(--no);
    border: 2px solid var(--no);
  }
  .btn-yep {
    background: #1a2a22;
    color: var(--yes);
    border: 2px solid var(--yes);
  }
  .btn-undo {
    width: 46px; height: 46px;
    background: var(--surface);
    color: var(--muted);
    border: 2px solid var(--border);
    font-size: 1.1rem;
  }

  /* ── RESULTS SCREEN ── */
  #results-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 0 16px;
    animation: fadeUp 0.4s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #results-screen h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(1.4rem, 5vw, 1.9rem);
    font-weight: 800;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #3ddc84, #00c9a7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
  }
  #results-screen p.sub {
    color: var(--muted);
    font-size: 0.82rem;
    text-align: center;
    margin-bottom: 18px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .result-list {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 45dvh;
    overflow-y: auto;
    padding-bottom: 8px;
  }
  .result-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 1rem;
    font-weight: 600;
    animation: fadeUp 0.3s ease both;
  }
  .result-item span.ri-emoji { font-size: 1.6rem; }
  .result-item span.ri-num {
    margin-left: auto;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    padding: 3px 8px;
    border-radius: 99px;
  }

  .empty-results {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 0.95rem;
  }
  .empty-results span { font-size: 2.5rem; display: block; margin-bottom: 10px; }

  .btn-restart {
    margin-top: 20px;
    background: linear-gradient(135deg, #ff5c5c, #ffb347);
    color: #fff;
    border: none;
    padding: 14px 36px;
    border-radius: 99px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 8px 24px rgba(255,92,92,0.3);
  }
  .btn-restart:hover { transform: scale(1.04); box-shadow: 0 12px 32px rgba(255,92,92,0.4); }

  /* ── EMPTY DECK ── */
  #empty-state {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    text-align: center;
    padding: 40px 20px;
    animation: fadeUp 0.4s ease;
  }
  #empty-state span { font-size: 3rem; margin-bottom: 12px; }
  #empty-state h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  #empty-state p { color: var(--muted); font-size: 0.88rem; margin-bottom: 22px; }

  /* Scrollbar */
  .result-list::-webkit-scrollbar { width: 4px; }
  .result-list::-webkit-scrollbar-track { background: transparent; }
  .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* Fly-away animation */
  @keyframes flyRight {
    to { transform: translateX(150%) rotate(30deg); opacity: 0; }
  }
  @keyframes flyLeft {
    to { transform: translateX(-150%) rotate(-30deg); opacity: 0; }
  }
  .fly-right { animation: flyRight 0.38s cubic-bezier(.55,.05,.67,.19) forwards; }
  .fly-left  { animation: flyLeft  0.38s cubic-bezier(.55,.05,.67,.19) forwards; }
</style>
</head>
<body>

<header>
  <h1>LunchSwipe 🍽️</h1>
  <p>Swipe right to save · left to skip</p>
</header>

<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
</div>
<div class="progress-label" id="progressLabel">0 / 14 swiped</div>

<!-- Card Stack -->
<div id="stack"></div>

<!-- Action Buttons -->
<div class="actions" id="actions">
  <button class="btn-action btn-nope" onclick="swipe('left')" title="Nope">✕</button>
  <button class="btn-action btn-undo"  onclick="undoSwipe()"   title="Undo">↺</button>
  <button class="btn-action btn-yep"  onclick="swipe('right')" title="Yep">♥</button>
</div>

<!-- Empty Deck -->
<div id="empty-state">
  <span>🎉</span>
  <h2>All done!</h2>
  <p>You've gone through every option.</p>
  <button class="btn-restart" onclick="showResults()">See My Picks →</button>
</div>

<!-- Results -->
<div id="results-screen">
  <h2>Your Lunch Picks 🎯</h2>
  <p class="sub" id="results-sub">places you liked</p>
  <div class="result-list" id="resultList"></div>
  <button class="btn-restart" onclick="restartApp()">Start Over 🔄</button>
</div>

<script>
const FOODS = [
  { name: "Daal Batti",     emoji: "🫕", tag: "Rajasthani" },
  { name: "Mahadev Dosa",   emoji: "🥞", tag: "South Indian" },
  { name: "Mohit Dosa",     emoji: "🫓", tag: "South Indian" },
  { name: "Biryani",        emoji: "🍚", tag: "Rice & Spice" },
  { name: "Egg Corner",     emoji: "🍳", tag: "Egg Dishes" },
  { name: "Punjabi Tadka",  emoji: "🧆", tag: "North Indian" },
  { name: "FoodLand",       emoji: "🏪", tag: "Multi-cuisine" },
  { name: "Medical Dosa",   emoji: "🌯", tag: "South Indian" },
  { name: "Mom's Kitchen",  emoji: "🍛", tag: "Home Style" },
  { name: "Deep Center",    emoji: "🥘", tag: "Local Fav" },
  { name: "Krushna",        emoji: "🍜", tag: "Local Fav" },
  { name: "Misal",          emoji: "🫙", tag: "Maharashtrian" },
  { name: "Sheetal",        emoji: "🍽️", tag: "Snacks & More" },
  { name: "Swadesh Mess",   emoji: "🥗", tag: "Mess Food" },
];

let deck = [];
let liked = [];
let history = [];
let isAnimating = false; // global lock to prevent double-swipe

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function restartApp() {
  liked = []; history = []; isAnimating = false;
  deck = [...FOODS];
  shuffle(deck);
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('actions').style.display = 'flex';
  renderStack();
  updateProgress();
}

function renderStack() {
  const stackEl = document.getElementById('stack');
  stackEl.innerHTML = '';

  if (deck.length === 0) {
    showEmpty();
    return;
  }

  // Show up to 3 cards; last item in deck array = top card
  const visible = deck.slice(-3);
  visible.forEach((food, idx) => {
    const card = buildCard(food);
    const isTop = idx === visible.length - 1;
    if (isTop) {
      card.classList.add('top');
      attachDrag(card);
    } else if (idx === visible.length - 2) {
      card.classList.add('behind-1');
    } else {
      card.classList.add('behind-2');
    }
    stackEl.appendChild(card);
  });
}

function buildCard(food) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.name = food.name;
  card.innerHTML = `
    <div class="stamp-yes">YEP ♥</div>
    <div class="stamp-no">NOPE ✕</div>
    <div class="card-emoji">${food.emoji}</div>
    <div class="card-name">${food.name}</div>
    <div class="card-tag">${food.tag}</div>
  `;
  return card;
}

function commitSwipe(cardEl, dir) {
  // Hard guard — if already animating, ignore
  if (isAnimating) return;
  isAnimating = true;

  const name = cardEl.dataset.name;
  const deckIdx = deck.findIndex(f => f.name === name);
  if (deckIdx === -1) { isAnimating = false; return; } // already processed

  const food = deck[deckIdx];
  deck.splice(deckIdx, 1);
  if (dir === 'right') liked.push(food);
  history.push({ food, dir });

  setTimeout(() => {
    isAnimating = false;
    renderStack();
    updateProgress();
  }, 400);
}

function attachDrag(card) {
  let startX = 0, curX = 0, isDragging = false;

  const onStart = (x) => {
    if (isAnimating) return;
    startX = x; curX = 0; isDragging = true;
    card.style.transition = 'none';
  };

  const onMove = (x) => {
    if (!isDragging || isAnimating) return;
    curX = x - startX;
    const rotate = curX * 0.06;
    card.style.transform = `translateX(${curX}px) rotate(${rotate}deg)`;
    const yes = card.querySelector('.stamp-yes');
    const no  = card.querySelector('.stamp-no');
    if (curX > 20)       { yes.style.opacity = Math.min((curX - 20) / 60, 1); no.style.opacity = 0; }
    else if (curX < -20) { no.style.opacity = Math.min((-curX - 20) / 60, 1); yes.style.opacity = 0; }
    else                 { yes.style.opacity = 0; no.style.opacity = 0; }
  };

  const onEnd = () => {
    if (!isDragging) return;
    isDragging = false;
    if (isAnimating) { card.style.transform = ''; return; }

    card.style.transition = 'transform 0.38s ease';
    if (curX > 80) {
      card.style.transform = 'translateX(150%) rotate(30deg)';
      commitSwipe(card, 'right');
    } else if (curX < -80) {
      card.style.transform = 'translateX(-150%) rotate(-30deg)';
      commitSwipe(card, 'left');
    } else {
      card.style.transform = '';
      card.querySelector('.stamp-yes').style.opacity = 0;
      card.querySelector('.stamp-no').style.opacity = 0;
    }
    curX = 0;
  };

  card.addEventListener('mousedown',  e => onStart(e.clientX));
  window.addEventListener('mousemove', e => { if (isDragging) onMove(e.clientX); });
  window.addEventListener('mouseup',   onEnd);

  card.addEventListener('touchstart', e => { e.preventDefault(); onStart(e.touches[0].clientX); }, { passive: false });
  card.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
  card.addEventListener('touchend',   onEnd);
}

function swipe(dir) {
  if (isAnimating) return;
  const top = document.querySelector('.card.top');
  if (!top) return;
  top.style.transition = 'transform 0.38s ease';
  top.style.transform = dir === 'right' ? 'translateX(150%) rotate(30deg)' : 'translateX(-150%) rotate(-30deg)';
  const stamp = top.querySelector(dir === 'right' ? '.stamp-yes' : '.stamp-no');
  if (stamp) stamp.style.opacity = 1;
  commitSwipe(top, dir);
}

function undoSwipe() {
  if (history.length === 0 || isAnimating) return;
  const last = history.pop();
  deck.push(last.food);
  if (last.dir === 'right') liked = liked.filter(f => f.name !== last.food.name);
  renderStack();
  updateProgress();
}

function updateProgress() {
  const total = FOODS.length;
  const done  = total - deck.length;
  document.getElementById('progressFill').style.width = `${(done / total) * 100}%`;
  document.getElementById('progressLabel').textContent = `${done} / ${total} swiped`;
}

function showEmpty() {
  document.getElementById('stack').innerHTML = '';
  document.getElementById('actions').style.display = 'none';
  document.getElementById('empty-state').style.display = 'flex';
}

function showResults() {
  document.getElementById('empty-state').style.display = 'none';
  const rs = document.getElementById('results-screen');
  rs.style.display = 'flex';

  const list = document.getElementById('resultList');
  list.innerHTML = '';

  document.getElementById('results-sub').textContent =
    liked.length === 0
      ? "Hmm, you liked nothing!"
      : `${liked.length} place${liked.length > 1 ? 's' : ''} you liked`;

  if (liked.length === 0) {
    list.innerHTML = '<div class="empty-results"><span>😅</span>You swiped left on everything! Try again?</div>';
    return;
  }

  liked.forEach((food, i) => {
    if (!food) return; // safety check
    const item = document.createElement('div');
    item.className = 'result-item';
    item.style.animationDelay = `${i * 0.06}s`;
    item.innerHTML = `
      <span class="ri-emoji">${food.emoji}</span>
      <span>${food.name}</span>
      <span class="ri-num">${food.tag}</span>
    `;
    list.appendChild(item);
  });
}

restartApp();
</script>
</body>
</html>
